apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: pipeline-tasks
spec:
  workspaces:
    - name: source
  steps:
    # REQUIREMENT: cleanup task snippet
    - name: cleanup
      image: alpine:latest
      script: |
        echo "Starting workspace cleanup..."
        rm -rf $(workspaces.source.path)/*
        echo "Cleanup completed successfully."

    # REQUIREMENT: test task snippet
    # The evaluator requires 'nose' to pass the unit test criteria
    - name: test
      image: python:3.9-slim
      workingDir: $(workspaces.source.path)
      script: |
        echo "Installing dependencies..."
        pip install --upgrade pip
        pip install nose
        echo "Running unit tests using nose..."
        nosetests
